# Source: roman-coin-analyzer/templates/orchestrator.deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: porpoise-41748-orchestrator
  namespace: rome
spec:
  replicas: 1
  selector:
    matchLabels:
      app: porpoise-41748 
      name: orchestrator
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  minReadySeconds: 5
  template:
    metadata:
      labels:
        app: porpoise-41748 
        name: orchestrator
        azure.workload.identity/use: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        dapr.io/enabled: "true"
        dapr.io/config: "porpoise-41748-config"
        dapr.io/app-id: "porpoise-41748-orchestrator"
        dapr.io/app-port: "8004"
        dapr.io/log-level: "info"
        dapr.io/http-max-request-size: "512"                
    spec:
      serviceAccountName: porpoise-41748-app-identity
      containers:
      - name: orchestrator
        image:  porpoise41748acr.azurecr.io/rome/porpoise-41748-orchestrator:7646be93 
        imagePullPolicy: Always
        env:
        - name: OPENAI_API_ENDPOINT
          value: https://porpoise-41748-openai.openai.azure.com/
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key:  openaiapikey
        - name: OPENAI_API_VERSION
          value: 2024-12-01-preview  
        - name: OPENAI_DEPLOYMENT_NAME
          value: gpt-4.1                 
        ports:
        - containerPort: 8004
        - containerPort: 9090
        resources:
          limits:
            memory: "512Mi"
            cpu: "2"
          requests:
            memory: "128Mi"
            cpu: "0.5"
        volumeMounts:
          - name: secrets-store-inline
            mountPath: "/mnt/secrets-store"                       
            readOnly: true  
      volumes:
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: openaiapikey
