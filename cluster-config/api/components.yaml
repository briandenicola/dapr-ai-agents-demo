# Source: roman-coin-analyzer/templates/secretprovider.yaml
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: openaiapikey
  namespace: rome
spec:
  provider: azure
  secretObjects:
  - secretName: app-secrets
    type: Opaque                            
    data:                 
    - key: openaiapikey
      objectName: openaiapikey
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    keyvaultName: porpoise41748appkv
    clientID: 4a0cb5cd-7fc0-4628-9ad7-bb7ea60865fd
    cloudName: ""                                                  
    objects:  |
      array:
        - |
          objectName: openaiapikey
          objectType: secret
          objectVersion: ""                               
    tenantId: 16b3c013-d300-468d-ac64-7eda0820b6d3
